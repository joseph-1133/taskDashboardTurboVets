<div
  cdkDropList
  [id]="columnStatus"
  [cdkDropListData]="taskList"
  [cdkDropListConnectedTo]="['Todo', 'In Progress', 'Completed']"
  class="taskDropList"
  (cdkDropListDropped)="dropTask($event)">
  @for (task of taskList; track task.id) {
    <div class="taskCard" cdkDrag>
      <div class="dragHandle" cdkDragHandle>
          <h3>{{ task.title }}</h3>
          <p>{{ task.description }}</p>
          <p>Due Date: {{ task.dueDate }}</p>
          <p>Priority: {{ task.priority }}</p>
          <p>
            Status:
            <span [class]="getStatusClass(task.status)">
              {{ task.status }}
            </span>
          </p>
          <p>Category: {{ task.category }}</p>
          <button type="button" (click)="editTask(task)">Edit</button>
          
            @if (pendingDeleteTaskId === task.id) {

              <button
                type="button"
                class="confirmDeleteButton"
                (click)="deleteTask(task.id)">
                Confirm
              </button>

              <button
                type="button"
                class="cancelDeleteButton"
                (click)="cancelDelete()">
                Cancel
              </button>

            } @else {

              <button
                type="button"
                class="deleteButton"
                (click)="confirmDelete(task.id)">
                Delete
              </button>

            }

        </div>
    </div>
  }
</div>
