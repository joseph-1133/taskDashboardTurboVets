<div class="taskFormContainer">
    <div class="formHeader">
    <h2>
      {{ selectedTask ? 'Edit Task' : 'Create New Task' }}
    </h2>

    <button
      type="button"
      class="closeButton"
      (click)="closeForm()">
      ✕
    </button>
  </div>
  
  @if (errorMessage) {
    <p class="errorMessage">
      {{ errorMessage }}
    </p>
  }
  <form class="taskForm" #taskForm="ngForm" (ngSubmit)="addTask()">
    <label>
      Title
      <input type="text" name="title" [(ngModel)]="title" placeholder="Enter task title" required />
    </label>
    <label>
      Description
      <textarea name="description" [(ngModel)]="description" placeholder="Enter task description" required></textarea>
    </label>

    <label>
      Due Date
      <input type="date" [(ngModel)]="dueDate" name="dueDate" (click)="openDatePicker($event)" required>
    </label>

    <label>
      Priority
      <select name="priority" [(ngModel)]="priority" required>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </label>

    <label>
      Status
      <select name="status" [(ngModel)]="status" required>
        <option value="Todo">Todo</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
    </label>

    <label>
      Category
      <input type="text" name="category" [(ngModel)]="category" placeholder="Enter category" required />
    </label>

    <button type="submit">
      {{ selectedTask ? 'Update Task' : 'Add Task' }}
    </button>
  </form>
</div>
